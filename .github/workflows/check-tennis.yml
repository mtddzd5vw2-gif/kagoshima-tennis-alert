name: Check tennis court availability

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: tennis-alert
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Send LINE test message
        run: |
          python - <<'PY'
          import os
          import json
          import urllib.request

          token = os.getenv("LINE_CHANNEL_ACCESS_TOKEN")
          to = os.getenv("LINE_USER_ID")

          if not token:
              raise RuntimeError("LINE_CHANNEL_ACCESS_TOKEN is missing")
          if not to:
              raise RuntimeError("LINE_USER_ID is missing")

          payload = {
              "to": to,
              "messages": [
                  {
                      "type": "text",
                      "text": "鹿児島テニス空きアラート：GitHub ActionsからのLINE通知テストです。"
                  }
              ]
          }

          req = urllib.request.Request(
              "https://api.line.me/v2/bot/message/push",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json"
              },
              method="POST"
          )

          with urllib.request.urlopen(req, timeout=20) as res:
              print("LINE status:", res.status)
          PY

      - name: Create checker script
        run: |
          cat > run_check.py <<'PY'
          import os
          import re
          import json
          import urllib.request
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          TARGET_NAME = "鴨池県営テニスコート"
          TARGET_URL = "https://v2.spm-cloud.com/user/kamoike-undo/reserves/daily?date=2026-05-03&category_id=483&area_id=289"

          DESIRED_START = 8 * 60
          DESIRED_END = 13 * 60

          AVAILABLE_KEYWORDS = ["予約可", "○", "空き", "空"]
          UNAVAILABLE_KEYWORDS = ["予約済み", "予約不可", "要問合せ", "×"]

          LINE_TOKEN = os.getenv("LINE_CHANNEL_ACCESS_TOKEN")
          LINE_USER_ID = os.getenv("LINE_USER_ID")

          Path("snapshots").mkdir(exist_ok=True)

          def minutes(t: str) -> int:
              h, m = t.replace("：", ":").split(":")
              return int(h) * 60 + int(m)

          def has_time_in_window(text: str) -> bool:
              ranges = re.findall(
                  r"(\d{1,2}[:：]\d{2})\s*[〜~\-－–—]\s*(\d{1,2}[:：]\d{2})",
                  text
              )

              for s, e in ranges:
                  sm = minutes(s)
                  em = minutes(e)
                  if max(sm, DESIRED_START) < min(em, DESIRED_END):
                      return True

              singles = re.findall(r"\d{1,2}[:：]\d{2}", text)
              for s in singles:
                  sm = minutes(s)
                  em = sm + 60
                  if max(sm, DESIRED_START) < min(em, DESIRED_END):
                      return True

              return False

          def line_push(text: str):
              if not LINE_TOKEN or not LINE_USER_ID:
                  print("LINE secrets are missing. Skip LINE push.")
                  return

              url = "https://api.line.me/v2/bot/message/push"
              payload = {
                  "to": LINE_USER_ID,
                  "messages": [
                      {
                          "type": "text",
                          "text": text[:4900]
                      }
                  ]
              }

              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {LINE_TOKEN}",
                      "Content-Type": "application/json"
                  },
                  method="POST"
              )

              with urllib.request.urlopen(req, timeout=20) as res:
                  print("LINE status:", res.status)

          def clean(s: str) -> str:
              return re.sub(r"\s+", " ", s or "").strip()

          def looks_available(text: str) -> bool:
              if not any(k in text for k in AVAILABLE_KEYWORDS):
                  return False

              if any(k in text for k in UNAVAILABLE_KEYWORDS):
                  return False

              if "予約可 要問合せ 予約済み 予約不可" in text:
                  return False

              if text.strip() in ["予約可", "○", "空", "空き"]:
                  return False

              return True

          def main():
              print("Target:", TARGET_URL)

              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      locale="ja-JP",
                      timezone_id="Asia/Tokyo",
                      user_agent=(
                          "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                          "AppleWebKit/537.36 (KHTML, like Gecko) "
                          "Chrome/120.0 Safari/537.36"
                      )
                  )

                  page = context.new_page()
                  page.goto(TARGET_URL, wait_until="domcontentloaded", timeout=60000)

                  try:
                      page.wait_for_load_state("networkidle", timeout=15000)
                  except Exception:
                      pass

                  page.wait_for_timeout(5000)

                  html = page.content()
                  Path("snapshots/kamoike.html").write_text(html, encoding="utf-8")
                  page.screenshot(path="snapshots/kamoike.png", full_page=True)

                  candidates = page.evaluate("""
                  () => {
                    const out = [];
                    const els = Array.from(
                      document.querySelectorAll('a,button,td,th,li,div,span,[role="button"]')
                    );

                    for (const el of els) {
                      const parts = [
                        el.innerText || '',
                        el.getAttribute('aria-label') || '',
                        el.getAttribute('title') || '',
                        el.getAttribute('data-original-title') || ''
                      ].map(s => (s || '').replace(/\\s+/g, ' ').trim()).filter(Boolean);

                      let node = el;
                      for (let i = 0; i < 5 && node; i++) {
                        if (node.innerText) {
                          parts.push(node.innerText.replace(/\\s+/g, ' ').trim());
                        }
                        node = node.parentElement;
                      }

                      const uniq = Array.from(new Set(parts)).filter(s => s && s.length < 900);
                      for (const s of uniq) out.push(s);
                    }

                    return Array.from(new Set(out));
                  }
                  """)

                  browser.close()

              hits = []

              for raw in candidates:
                  text = clean(raw)

                  if not text:
                      continue

                  if not looks_available(text):
                      continue

                  if not has_time_in_window(text):
                      continue

                  hits.append(text)

              unique_hits = []
              seen = set()

              for h in hits:
                  if h not in seen:
                      seen.add(h)
                      unique_hits.append(h)

              print(f"candidates={len(unique_hits)}")

              if unique_hits:
                  body = "\n\n".join([f"- {h[:300]}" for h in unique_hits[:10]])

                  msg = (
                      "【テニスコート空き候補】\n"
                      f"施設：{TARGET_NAME}\n"
                      "対象：2026-05-03 8:00〜13:00\n\n"
                      f"{body}\n\n"
                      f"予約ページ：{TARGET_URL}\n"
                      "※予約は公式サイトからご本人で行ってください。"
                  )

                  print(msg)
                  line_push(msg)

              else:
                  print("No matching availability candidates.")

          if __name__ == "__main__":
              main()
          PY

      - name: Run checker
        run: python run_check.py

      - name: Upload page snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spm-page-snapshots
          path: ./snapshots
          if-no-files-found: ignore
          retention-days: 3
