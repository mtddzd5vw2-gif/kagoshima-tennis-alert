name: Update tennis availability

on:
  workflow_dispatch:
  schedule:
    # JST 07:00〜23:30 の30分おき（GitHub ActionsのcronはUTC）
    - cron: "0,30 0-14,22-23 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: tennis-availability
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      KAMOIKE_SLOT_SELECTOR: ${{ vars.KAMOIKE_SLOT_SELECTOR }}
      SUMIZEI_URL_TEMPLATE: ${{ vars.SUMIZEI_URL_TEMPLATE }}
      SUMIZEI_SLOT_SELECTOR: ${{ vars.SUMIZEI_SLOT_SELECTOR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest

      - name: Update availability data
        run: python scripts/scrape.py

      - name: Commit changed availability data
        run: |
          if git diff --quiet -- data/availability.json; then
            echo "Availability data is unchanged."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/availability.json
            git commit -m "data: update tennis availability"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare GitHub Pages files
        run: |
          mkdir _site
          cp index.html _site/index.html
          mkdir _site/data
          cp data/availability.json _site/data/availability.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
